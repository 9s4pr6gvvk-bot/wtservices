<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>WT Services – Coming Soon</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&family=DM+Serif+Display&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f7f7f5;
      --white: #ffffff;
      --black: #111111;
      --mid: #555555;
      --light: #aaaaaa;
      --border: #e2e2de;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--black);
      font-family: 'DM Sans', sans-serif;
    }

    .page {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 3rem 2rem;
      text-align: center;
    }

    /* Logo container with white bg */
    .logo-wrap {
      background: var(--white);
      border-radius: 16px;
      padding: 2rem 2.4rem;
      box-shadow: 0 2px 24px rgba(0,0,0,0.07);
      opacity: 0;
      transform: translateY(14px);
      animation: fadeUp 0.7s 0.2s ease forwards;
    }
    .logo-wrap img {
      width: 200px;
      max-width: 55vw;
      display: block;
      object-fit: contain;
    }

    /* Thin divider */
    .sep {
      width: 40px;
      height: 1px;
      background: var(--border);
      margin: 2.8rem auto;
      opacity: 0;
      animation: fadeIn 0.6s 0.7s ease forwards;
    }

    /* Headline */
    .headline {
      font-family: 'DM Serif Display', serif;
      font-size: clamp(2.4rem, 7vw, 4.2rem);
      font-weight: 400;
      letter-spacing: -0.01em;
      line-height: 1.1;
      color: var(--black);
      opacity: 0;
      transform: translateY(14px);
      animation: fadeUp 0.7s 0.85s ease forwards;
    }

    .sub {
      margin-top: 1rem;
      font-size: 0.95rem;
      font-weight: 300;
      color: var(--light);
      letter-spacing: 0.04em;
      opacity: 0;
      animation: fadeUp 0.7s 1.05s ease forwards;
    }

    /* CTA */
    .cta {
      margin-top: 2.8rem;
      opacity: 0;
      animation: fadeUp 0.7s 1.25s ease forwards;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 0.6rem;
      padding: 0.8rem 2rem;
      background: var(--black);
      color: var(--white);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.88rem;
      font-weight: 400;
      letter-spacing: 0.02em;
      text-decoration: none;
      border-radius: 8px;
      transition: background 0.2s ease, transform 0.2s ease;
    }
    .btn:hover {
      background: #333;
      transform: translateY(-1px);
    }
    .btn svg {
      opacity: 0.7;
    }

    /* Footer */
    footer {
      position: absolute;
      bottom: 2rem;
      font-size: 0.75rem;
      color: var(--light);
      letter-spacing: 0.03em;
      opacity: 0;
      animation: fadeIn 0.7s 1.5s ease forwards;
    }

    @keyframes fadeUp {
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeIn {
      to { opacity: 1; }
    }
  </style>
</head>
<body>
  <div class="page">

    <div class="logo-wrap">
      <img
        src="https://raw.githubusercontent.com/9s4pr6gvvk-bot/wtservices/refs/heads/main/MT-Services-logo%20(1).jpg"
        alt="WT Services"
      />
    </div>

    <div class="sep"></div>

    <h1 class="headline">Website Coming Soon</h1>
    <p class="sub">We're working on something new. Check back shortly.</p>

    <div class="cta">
      <a class="btn" href="mailto:info@wtservices.co.uk">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <rect x="2" y="4" width="20" height="16" rx="2"/>
          <polyline points="2,4 12,13 22,4"/>
        </svg>
        info@wtservices.co.uk
      </a>
    </div>

    <footer>© 2026 WT Services</footer>
  </div>
</body>
</html>
